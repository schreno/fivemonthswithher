<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Love Note</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Dancing+Script:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           CUSTOM FONTS from /Fonts folder
           ============================================================ */
        @font-face {
            font-family: 'RyukExtra';
            src: url('Fonts/RyukExtra.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'DeathFont';
            src: url('Fonts/DeathFont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'RyukExtra2';
            src: url('Fonts/RyukExtra2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'DeathFont2';
            src: url('Fonts/DeathFont2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ============================================================
           ROOT / RESET
           ============================================================ */
        :root {
            --void: #000;
            --charcoal: #0b0b0c;
            --leather: #000000;
            --leather-hi: #232025;
            --blood: #7a0f16;
            --blood-bright: #b3141c;
            --parchment: #f4ebd0;
            --parchment-dark: #e8dcb8;
            --ink: #2b2420;
            --ash: #cfcad0;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--void);
            overflow: hidden;
            font-family: 'EB Garamond', serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ============================================================
           INTRO TRIGGER GATEWAY
           ============================================================ */
        #intro-gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void);
            transition: opacity 1.5s ease;
        }
        #intro-gate.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .gate-text {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            font-weight: 400;
            text-transform: lowercase;
            transition: color 0.3s ease;
            text-align: center;
            max-width: 90vw;
            padding: 0 1rem;
        }
        .gate-text:hover {
            color: rgba(255, 255, 255, 0.85);
        }
        .gate-text.mobile-message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            text-transform: none;
            cursor: default;
            pointer-events: none;
            line-height: 1.6;
            font-family: 'Dancing Script', cursive;
            font-weight: 500;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
        }

        /* ============================================================
           STAGE & WRAPPER — long, smooth camera tilt
           ============================================================ */
        #stage {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 10;
            background: var(--void);
        }

        #wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200vh;
            transform: translateY(-50vh);
            transition: transform 5s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
            background:
                radial-gradient(ellipse at 50% 60%, #0a0a0c 0%, #000 100%);
        }
        #wrapper.camera-up {
            transform: translateY(0vh);
        }

        #wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(11, 14, 42, 0.95) 0%,
                    rgba(10, 10, 12, 0.8) 30%,
                    transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
           SKY CONTENT — full, beautiful, fills viewport
           ============================================================ */
        #sky-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            transition: opacity 1.8s ease;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 40%, #0f1428 0%, #070915 60%, #000 100%);
        }
        #sky-content::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 100%, rgba(60, 30, 80, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 30% 20%, rgba(40, 50, 100, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        #sky-content.visible {
            opacity: 1;
        }

        /* Bleeds the blue night sky into blood-red before the final fade to black (phase 4 only) */
        .blood-overlay {
            position: absolute;
            inset: 0;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 55%, rgba(179, 20, 28, 0.55) 0%, rgba(90, 8, 12, 0.75) 45%, rgba(0, 0, 0, 0.96) 100%);
            transition: opacity 4s ease-in;
        }
        .blood-overlay.show {
            opacity: 1;
        }

        .moon {
            width: clamp(100px, 22vw, 200px);
            height: clamp(100px, 22vw, 200px);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #d0d8ff);
            box-shadow:
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 80px rgba(255, 255, 255, 0.15),
                0 0 160px rgba(255, 255, 255, 0.08);
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
            transition: background 4s ease, box-shadow 4s ease;
        }
        /* Blood moon — the moon curdles from white/blue to red as the sky bleeds (phase 4) */
        .moon.blood-moon {
            background: radial-gradient(circle at 30% 30%, #ff5a4d, #7a0f16);
            box-shadow:
                0 0 40px rgba(179, 20, 28, 0.5),
                0 0 90px rgba(122, 15, 22, 0.32),
                0 0 180px rgba(90, 8, 12, 0.2);
        }

        /* Text curdle — the message slowly bleeds toward blood-red, still and unnerving (no jitter) */
        .sky-message .main,
        .sky-message .sub {
            transition: filter 4s ease, color 4s ease;
        }
        .sky-message.curdling .main {
            filter: sepia(1) saturate(6) hue-rotate(-40deg) brightness(0.85);
        }
        .sky-message.curdling .sub {
            color: rgba(200, 40, 40, 0.85);
            -webkit-text-fill-color: rgba(200, 40, 40, 0.85);
        }

        /* Ghost double — a faint, slightly-offset duplicate that lingers behind the text, like something else is there */
        .sky-message {
            position: relative;
        }
        .ghost-double {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            color: rgba(179, 20, 28, 0.5);
            transform: translate(3px, 2px) scale(1.01);
            filter: blur(1px);
            transition: opacity 2.6s ease-in-out;
            z-index: -1;
        }
        .ghost-double.show {
            opacity: 0.55;
        }
        .ghost-double .main,
        .ghost-double .sub {
            font-family: 'Dancing Script', cursive;
            -webkit-text-fill-color: currentColor;
            background: none;
        }
        .ghost-double .main {
            font-size: clamp(2.2rem, 9vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        .ghost-double .sub {
            font-size: clamp(1.1rem, 4.5vw, 2.5rem);
            font-style: italic;
            margin-top: 0.5rem;
        }

        /* Static/noise flash overlay */
        #static-noise {
            position: fixed;
            inset: 0;
            z-index: 45;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size: 220px 220px;
            transition: opacity 0.06s linear;
        }
        #static-noise.flash {
            opacity: 0.32;
        }
        .moon::after {
            content: "";
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(200, 210, 255, 0.12);
            filter: blur(10px);
        }
        .moon::before {
            content: "";
            position: absolute;
            bottom: 20%;
            right: 15%;
            width: 15%;
            height: 15%;
            border-radius: 50%;
            background: rgba(180, 190, 240, 0.08);
            filter: blur(6px);
        }

        .sky-message {
            font-family: 'Dancing Script', cursive;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.15), 0 0 80px rgba(255, 255, 255, 0.05);
            padding: 0 1rem;
            position: relative;
            z-index: 2;
            transition: opacity 0.6s ease;
        }
        .sky-message .main {
            font-size: clamp(2.2rem, 9vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1.3;
            background: linear-gradient(to right, #fff, #e0e8ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .sky-message .sub {
            font-size: clamp(1.1rem, 4.5vw, 2.5rem);
            font-weight: 400;
            opacity: 0.85;
            margin-top: 0.5rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
            -webkit-text-fill-color: rgba(255, 255, 255, 0.9);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: twinkle 2.5s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 0.9;
                transform: scale(1.2);
            }
        }

        /* ============================================================
           VERTICAL WIND STREAKS — fade out naturally
           ============================================================ */
        .wind-streak {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4), transparent);
            border-radius: 2px;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            animation: windFall 0.9s linear forwards;
        }
        @keyframes windFall {
            0% {
                opacity: 0.6;
                transform: translateY(-100px);
            }
            100% {
                opacity: 0;
                transform: translateY(calc(100vh + 100px));
            }
        }

        /* ============================================================
           BOOK CONTAINER — properly centered, no glow
           ============================================================ */
        #book-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(84vw, 355px);
            height: min(116vw, 515px);
            transform: translate(-50%, -50%) scale(0.92);
            opacity: 0;
            transform-style: preserve-3d;
            perspective: 2200px;
            perspective-origin: 50% 50%;
            will-change: transform, opacity;
            z-index: 10;
            transition: opacity 2.4s ease, transform 1.7s cubic-bezier(0.65, 0.05, 0.36, 1);
        }
        #book-wrap.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #book-wrap.open {
            transform: translate(0%, -50%) scale(1);
        }
        #book-wrap.hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        #book-wrap::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -14%;
            width: 120%;
            height: 22%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at center, rgba(179, 20, 28, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(6px);
            pointer-events: none;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* ============================================================
           LEAVES
           ============================================================ */
        .leaf {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            cursor: pointer;
            transform: rotateY(0deg);
            transition: transform 1.7s cubic-bezier(0.65, 0.05, 0.36, 1);
            will-change: transform;
        }
        .leaf.flipped {
            transform: rotateY(-180deg);
            pointer-events: none;
        }
        .leaf.locked {
            cursor: default;
            pointer-events: none;
        }

        .face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
        }
        .face-front {
            border-radius: 2px 8px 8px 2px;
        }
        .face-back {
            border-radius: 8px 2px 2px 8px;
            transform: rotateY(180deg);
        }

        .parchment {
            background:
                radial-gradient(ellipse 140% 110% at 50% 50%, rgba(255, 255, 255, 0.05), transparent 80%),
                linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.1);
        }
        .parchment::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                repeating-radial-gradient(circle at 10% 20%, rgba(120, 95, 45, 0.05) 0px, transparent 2px),
                repeating-radial-gradient(circle at 70% 60%, rgba(120, 95, 45, 0.05) 0px, transparent 2px),
                repeating-radial-gradient(circle at 40% 85%, rgba(120, 95, 45, 0.05) 0px, transparent 3px);
            background-size: 6px 6px, 9px 9px, 7px 7px;
            mix-blend-mode: multiply;
            opacity: .85;
        }
        .parchment::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 16% 84%, rgba(120, 70, 28, 0.28) 0%, transparent 24%),
                radial-gradient(circle at 84% 10%, rgba(101, 58, 18, 0.22) 0%, transparent 28%),
                radial-gradient(circle at 55% 96%, rgba(90, 54, 14, 0.20) 0%, transparent 20%),
                radial-gradient(circle at 6% 28%, rgba(80, 50, 15, 0.16) 0%, transparent 18%),
                radial-gradient(circle at 92% 62%, rgba(70, 42, 12, 0.14) 0%, transparent 16%),
                repeating-linear-gradient(to bottom,
                    transparent 0,
                    transparent 1.7em,
                    rgba(70, 50, 20, 0.11) 1.7em,
                    rgba(70, 50, 20, 0.11) calc(1.7em + 1px)),
                radial-gradient(ellipse at center, transparent 52%, rgba(60, 40, 15, 0.30) 100%);
            mix-blend-mode: multiply;
        }

        .leather {
            background-color: #000 !important;
            background-image: none !important;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .leather::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 3px),
                repeating-linear-gradient(25deg, rgba(0, 0, 0, 0.25) 0px, rgba(0, 0, 0, 0.25) 1px, transparent 1px, transparent 4px);
            opacity: .5;
            mix-blend-mode: overlay;
        }
        .leather::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.06), transparent 55%);
        }

        /* ============================================================
           TYPOGRAPHY & CONTENT (inside book) — with custom fonts
           ============================================================ */
        .rule-inner,
        .msg-inner {
            position: relative;
            z-index: 2;
            height: 100%;
        }
        .rule-inner {
            padding: 9% 8% 9% 12%;
            color: rgba(43, 36, 32, 0.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .rule-title {
            font-family: 'DeathFont', 'Cinzel', serif;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            letter-spacing: 0.12em;
            color: var(--blood);
            font-weight: 700;
            margin: 0 0 0.6em 0;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(122, 15, 22, 0.35);
            padding-bottom: 0.4em;
        }
        .rule-line {
            font-family: 'DeathFont2', 'EB Garamond', serif;
            font-size: clamp(1rem, 2.8vw, 1.4rem);
            line-height: 1.8;
            font-style: italic;
            font-weight: 400;
            color: rgba(43, 36, 32, 0.85);
        }

        .msg-inner {
            padding: 11% 12% 8% 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .typewriter-text {
            font-family: 'RyukExtra', 'Dancing Script', cursive;
            font-weight: normal;
            font-size: clamp(1.0rem, 3.4vw, 1.45rem);
            line-height: 1.55;
            color: var(--ink);
            text-shadow: 0 0 1px rgba(43, 36, 32, 0.15);
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            margin: 0;
            width: 100%;
        }

        .caret {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--ink);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.85s steps(1) infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .page-hint {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 6%;
            text-align: center;
            font-family: 'RyukExtra2', 'EB Garamond', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.08em;
            color: rgba(0, 0, 0, 0.65);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .page-hint.show {
            opacity: 1;
            animation: pulseHint 2.6s ease-in-out infinite;
        }
        @keyframes pulseHint {
            0%,
            100% {
                opacity: 0;
            }
            50% {
                opacity: .35;
            }
        }

        .cover-hint {
            position: absolute;
            bottom: 6%;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            color: rgba(230, 220, 210, 0.3);
            z-index: 2;
            animation: pulseHint 2.6s ease-in-out infinite;
            -webkit-user-select: none;
            user-select: none;
        }

        .closing-mark {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--blood);
            margin-top: 0.8em;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: none;
        }
        .closing-mark.show {
            display: block;
            opacity: 1;
            animation: heartGlow 2.4s ease-in-out infinite;
        }
        @keyframes heartGlow {
            0%,
            100% {
                text-shadow: 0 0 10px rgba(122, 15, 22, 0.35);
            }
            50% {
                text-shadow: 0 0 22px rgba(122, 15, 22, 0.75);
            }
        }

        /* ============================================================
           FINAL LETTER PANEL CONFIGURATIONS (Phase 5 Transition)
           ============================================================ */
        #final-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            background-image:
                radial-gradient(ellipse 55% 45% at 30% 30%, rgba(150, 20, 25, 0.40) 0%, transparent 62%),
                radial-gradient(ellipse 65% 55% at 70% 68%, rgba(90, 8, 12, 0.32) 0%, transparent 65%),
                radial-gradient(ellipse 90% 90% at 50% 50%, #070404 0%, #000 100%);
            background-size: 260% 260%, 260% 260%, 100% 100%;
            background-repeat: no-repeat;
            animation: bloodDrift 48s ease-in-out infinite alternate;
            opacity: 0;
            pointer-events: none;
            transition: opacity 6s ease;
            z-index: 60;
        }
        @keyframes bloodDrift {
            0%   { background-position: 12% 18%, 88% 82%, center; }
            22%  { background-position: 38% 58%, 58% 28%, center; }
            48%  { background-position: 64% 22%, 30% 70%, center; }
            71%  { background-position: 22% 74%, 78% 42%, center; }
            100% { background-position: 46% 34%, 54% 66%, center; }
        }
        #final-card {
            position: relative;
            width: min(95vw, 600px);
            height: min(150vw, 800px);
            background: url('deathnote-bpage-removebg.png') no-repeat center/cover;
            box-shadow: none;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 2.2s ease;
        }
        #final-card.show {
            opacity: 1;
        }

        #final-text {
            position: absolute;
            top: 24%;
            left: 10%;
            right: 10%;
            bottom: 8%;
            font-family: 'DeathFont2', 'EB Garamond', serif;
            font-size: clamp(0.8rem, 2.0vw, 1.05rem);
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.85);
            white-space: pre-wrap;     /* Keeps \n as paragraph breaks */
            word-wrap: break-word;     /* Forces long words to wrap */
            overflow-y: auto;          /* Enables scroll */
            scrollbar-width: none;     /* Hide scrollbar Firefox */
            -ms-overflow-style: none;  /* Hide scrollbar IE/Edge[cite: 1] */
        }

        /* Hides scrollbar for Chrome, Safari, and Opera */
        #final-text::-webkit-scrollbar {
            display: none;
        }
        /* ============================================================
           VIGNETTE (fixed over viewport)
           ============================================================ */
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.75) 100%);
            z-index: 30;
        }

        /* ============================================================
           PHASE FLASH — instant color slam that slowly fades to black
           ============================================================ */

        /* ============================================================

        /* ============================================================

        /* ============================================================
           AMBIENCE FADE-IN (reusable)
           ============================================================ */
        function fadeInAmbience(audioElement, targetVolume, durationMs) {
            if (!audioElement) return;
            audioElement.volume = 0;
            audioElement.play().catch(function() {});

            var intervalStepMs = 50;
            var totalSteps = durationMs / intervalStepMs;
            var volumeIncrement = targetVolume / totalSteps;
            var currentStep = 0;

            var fadeInterval = setInterval(function() {
                currentStep++;
                if (audioElement.volume + volumeIncrement >= targetVolume) {
                    audioElement.volume = targetVolume;
                    clearInterval(fadeInterval);
                } else {
                    audioElement.volume += volumeIncrement;
                }
            }, intervalStepMs);
            return fadeInterval;
        }

        function fadeOutAndStop(audioElement, durationMs) {
            if (!audioElement || audioElement.paused) return;
            var steps = Math.max(1, Math.floor(durationMs / 50));
            var startVolume = audioElement.volume;
            var step = 0;
            var fadeInterval = setInterval(function() {
                step++;
                var newVolume = startVolume * (1 - step / steps);
                if (newVolume <= 0.01 || step >= steps) {
                    audioElement.volume = 0;
                    audioElement.pause();
                    audioElement.currentTime = 0;
                    clearInterval(fadeInterval);
                } else {
                    audioElement.volume = newVolume;
                }
            }, 50);
        }

        function playWithFadeIn(audioElement, startAtSeconds, targetVolume, fadeMs) {
            if (!audioElement) return;

            function start() {
                try {
                    audioElement.currentTime = startAtSeconds;
                } catch (e) {}
                fadeInAmbience(audioElement, targetVolume, fadeMs);
            }
            if (audioElement.readyState >= 1) {
                start();
            } else {
                audioElement.addEventListener('loadedmetadata', start, { once: true });
            }
        }

        function crossfadeBeforeEnd(currentTrack, nextTrack, secondsBeforeEnd, targetVolume, fadeMs) {
            if (!currentTrack || !nextTrack) return;
            var triggered = false;

            function onTimeUpdate() {
                if (triggered) return;
                if (!isNaN(currentTrack.duration) &&
                    currentTrack.duration - currentTrack.currentTime <= secondsBeforeEnd) {
                    triggered = true;
                    currentTrack.removeEventListener('timeupdate', onTimeUpdate);
                    fadeOutAndStop(currentTrack, fadeMs);
                    playWithFadeIn(nextTrack, 0, targetVolume, fadeMs);
                }
            }
            currentTrack.addEventListener('timeupdate', onTimeUpdate);
        }

        /* ============================================================
           PHASE AUDIO CONTROL (only used for normal phase modes)
           ============================================================ */
        function getLawlietForPhase(phase) {
            if (phase === 2) return sndLawliet2;
            if (phase === 3) return sndLawliet3;
            if (phase === 4) return sndLawliet4;
            return null;
        }

        function startPhaseAudio(phase) {
            stopPhaseAudio();
            if (phase < 2 || phase > 4) return;

            var lawlietAudio = getLawlietForPhase(phase);
            if (!lawlietAudio) return;

            var suspiciousAudio = (phase === 4) ? sndSuspicious2 : sndSuspicious;
            phaseSuspicious = suspiciousAudio;
            phaseLawliet = lawlietAudio;

            suspiciousAudio.load();
            var vol = (phase === 4) ? 0.45 : 0.2;

            suspiciousAudio.currentTime = 0;

            suspiciousAudio.play().catch(function(err) {
                console.warn("Suspicious audio play failed:", err);
                setTimeout(function() {
                    suspiciousAudio.play().catch(function() {});
                }, 100);
            });

            phaseAudioTimeout = setTimeout(function() {
                var targetVol = 0.01;
                var duration = 8000;
                phaseFadeInterval = fadeInAmbience(lawlietAudio, targetVol, duration);

        function stopPhaseAudio() {
            if (phaseAudioTimeout) {

        /* ============================================================
           SEQUENCE — first appearance, book fades in (normal mode)
           ============================================================ */
        function runSequence() {
            if (IS_MOBILE) return;

            introGate.classList.add('fade-out');

                bookWrap.classList.remove('hidden', 'open');

                        console.log("Audio play error:", err);
                    });

                    setTimeout(function() {
                        var fadeStartTime = performance.now();
                        var fadeDuration = 10000;
                        var initialVolume = 0.3;

                        var fadeOutInterval = setInterval(function() {
                            var now = performance.now();
                            var elapsed = now - fadeStartTime;
                            var progress = Math.min(elapsed / fadeDuration, 1);
                            var newVolume = initialVolume * (1 - progress);
                            sndFadeIn.volume = Math.max(0, newVolume);

                            if (progress >= 1) {
                                sndFadeIn.volume = 0;
                                sndFadeIn.pause();
                                sndFadeIn.currentTime = 0;
                                clearInterval(fadeOutInterval);
                            }
                        }, 50);

            gateBtn.addEventListener('click', runSequence);
            gateBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                runSequence();
            }, { passive: false });
        }

        /* ============================================================
           EMBERS
           ============================================================ */
        function spawnEmbers() {
            var wrapperEl = document.getElementById('wrapper');
            var count = window.innerWidth < 600 ? 14 : 26;
            for (var n = 0; n < count; n++) {
                var e = document.createElement('div');
                e.className = 'ember';
                var left = Math.random() * 100;
                var size = 1.5 + Math.random() * 2.5;
                var duration = 10 + Math.random() * 14;
                var delay = Math.random() * 14;

                e.style.left = left + 'vw';
                e.style.width = size + 'px';
                e.style.height = size + 'px';

                e.style.animationDelay = delay + 's';

        window.addEventListener('load', spawnEmbers);

        /* ============================================================
           VERTICAL WIND STREAKS
           ============================================================ */
        function spawnWindStreaks() {
            var stage = document.getElementById('stage');
            var count = 14;
            for (var i = 0; i < count; i++) {
                var streak = document.createElement('div');
                streak.className = 'wind-streak';

        /* ============================================================
           LEAF FACTORY — phase‑aware (only used in normal mode)
           ============================================================ */
        var flipZ = 1000;
        var activeIndex = 0;
        var isClosing = false;

        function buildLeaf(index) {
            if (IS_END_MODE) return;
            if (index > RULES.length + 1) return;
            if (book.querySelector('.leaf[data-index="' + index + '"]')) return;

            var leaf = document.createElement('div');
            leaf.className = 'leaf locked';
            leaf.dataset.index = index;
            leaf.style.zIndex = 500 - index;

            var isClosingLeaf = (index === RULES.length + 1);
            var front = (index === 0) ? buildCoverFace() : buildMessageFace(isClosingLeaf);

            var back;
            if (index < RULES.length) {
                var ruleText = getRuleTextForPhase(currentPhase, index);
                var roman = getRulesForPhase(currentPhase)[index]?.roman || (index + 1);
                back = buildRuleFace(roman, ruleText);
            } else if (index === RULES.length) {
                back = buildRuleFace("Last Rule", LAST_RULE.ruleText);
            } else {
                back = buildBlankBackFace();
            }

            leaf.appendChild(front);
            leaf.appendChild(back);
            book.appendChild(leaf);

            leaf.addEventListener('click', function() {
                handleLeafClick(leaf, index);
            });
            leaf.addEventListener('touchend', function(e) {
                e.preventDefault();
                handleLeafClick(leaf, index);
            }, { passive: false });

            if (index === 0) {
                leaf.classList.remove('locked');
            }

            buildLeaf(index + 1);
        }

        function buildCoverFace() {
            var face = document.createElement('div');
            face.className = 'face face-front leather';
            face.innerHTML =
                '<img src="deathnote-logo.png" style="width:80%;display:block;margin:0 auto;user-select:none;" alt="Death Note Logo">' +
                '<div class="cover-hint" style="color:rgba(255,255,255,0.4);">tap to open</div>';
            return face;
        }

        function buildRuleFace(roman, text) {
            var title = roman === "Last Rule" ? roman : "Rule " + roman;
            var face = document.createElement('div');
            face.className = 'face face-back parchment';
            face.innerHTML =
                '<div class="rule-inner">' +
                '<p class="rule-title">' + title + '</p>' +
                '<p class="rule-line">' + text + '</p>' +
                '</div>';
            return face;
        }

        function buildMessageFace(isClosingLeaf) {
            var face = document.createElement('div');
            face.className = 'face face-front parchment';
            if (isClosingLeaf) {
                face.innerHTML =
                    '<div class="msg-inner">' +
                    '<p class="typewriter-text"></p>' +
                    '<p class="closing-mark">&#10084;</p>' +
                    '</div>';
            } else {
                face.innerHTML =
                    '<div class="msg-inner">' +
                    '<p class="typewriter-text"></p>' +
                    '<p class="page-hint">turn the page</p>' +
                    '</div>';
            }
            return face;
        }

        function buildBlankBackFace() {
            var face = document.createElement('div');
            face.className = 'face face-back parchment';
            return face;
        }

        /* ============================================================
           TYPEWRITER — ORIGINAL STYLE, with locking and blip
           ============================================================ */
        function startTypewriter(leaf, message, isClosingLeaf) {
            // Prevent re-entry
            if (leaf.dataset.typing === "true") return;
            leaf.dataset.typing = "true";

            var textEl = leaf.querySelector('.typewriter-text');
            var hint = leaf.querySelector('.page-hint');
            var mark = leaf.querySelector('.closing-mark');

            // Reset: remove any leftover caret, clear text, hide hints
            var oldCaret = textEl.querySelector('.caret');
            if (oldCaret) oldCaret.remove();

            // If it's a second read, we clear everything
            if (isSecondRead) {
                textEl.textContent = '';
                if (hint) hint.classList.remove('show');
                if (mark) mark.classList.remove('show');
            }

            // Check if the message is already fully typed (e.g., from a previous read)
            // We only skip if the text is non-empty and we're NOT doing a second read.
            var existingText = textEl.textContent.replace(/\s/g, '');
            if (existingText.length > 0 && !isSecondRead) {
                // Already typed, just show hint and unlock
                if (isClosingLeaf) {
                    if (mark) mark.classList.add('show');
                } else {
                    if (hint) hint.classList.add('show');
                }
                leaf.classList.remove('locked');
                delete leaf.dataset.typing;
                return;
            }

            // Clear any previous text (for second read, it's already cleared)
            if (!isSecondRead) {
                textEl.textContent = '';
            }

            // Add a caret
            var caret = document.createElement('span');
            caret.className = 'caret';
            textEl.appendChild(caret);

            var i = 0;

            function typeNext() {
                if (i >= message.length) {
                    // Done typing
                    stopTypeBlip();
                    // Remove caret
                    var c = textEl.querySelector('.caret');
                    if (c) c.remove();
                    // Show hint or mark
                    if (isClosingLeaf) {
                        if (mark) mark.classList.add('show');
                    } else {
                        if (hint) hint.classList.add('show');
                    }
                    leaf.classList.remove('locked');
                    delete leaf.dataset.typing;
                    return;
                }

                var char = message[i];

                // Ensure blip is playing (it will be started on first char)
                ensureBlipPlaying(0.30);

                // Append the character
                textEl.textContent = message.slice(0, i + 1);
                // Re-append the caret
                var c = textEl.querySelector('.caret');
                if (c) {
                    // Caret exists, move to end
                    textEl.appendChild(c);
                } else {
                    // Shouldn't happen, but just in case
                    var newCaret = document.createElement('span');
                    newCaret.className = 'caret';
                    textEl.appendChild(newCaret);
                }

                i++;

                // Determine pause
                var delay = TYPING_SPEED_MS;
                var shouldPause = false;

                if (char === '\n') {
                    delay = PAUSE_AFTER_LINE_MS;
                    shouldPause = true;
                } else if (char === '.') {
                    delay = PAUSE_AFTER_DOT_MS;
                    shouldPause = true;
                }

                if (shouldPause) {
                    // Stop the blip during pause
                    stopTypeBlip();
                    setTimeout(function() {
                        typeNext();
                    }, delay);
                } else {
                    setTimeout(typeNext, delay);
                }
            }

            // Start the typing
            typeNext();
        }

        function getMessage(index, isClosingLeaf) {
            if (isClosingLeaf) {
                return getFinalMessageForPhase(currentPhase);
            } else {
                return getMessageForPhase(currentPhase, index);
            }
        }

        /* ============================================================
           SURPRISE — long travel, effects fade out, moon reveal (normal mode)
           ============================================================ */
        function startSkySurprise() {
            stopPhaseAudio();

            updateSkyMessage(currentPhase);

            if (sndLawliet) {
                sndLawliet.pause();
                sndLawliet.currentTime = 0;
            }

            bookWrap.classList.remove('visible', 'open');
            bookWrap.classList.add('hidden');

            if (sndWhoosh) {
                sndWhoosh.currentTime = 0;
                sndWhoosh.volume = 0.5;
                sndWhoosh.play().catch(function() {});
            }

            var windInterval = setInterval(function() {
                spawnWindStreaks();
            }, 120);

            wrapper.classList.add('camera-up');

            setTimeout(function() {
                clearInterval(windInterval);

                if (sndWhoosh) {
                    let fadeInterval = setInterval(function() {
                        if (sndWhoosh.volume > 0.05) {
                            sndWhoosh.volume = Math.max(0, sndWhoosh.volume - 0.05);
                        } else {
                            sndWhoosh.volume = 0;
                            sndWhoosh.pause();
                            sndWhoosh.currentTime = 0;
                            clearInterval(fadeInterval);
                        }
                    }, 100);
                }

                setTimeout(function() {
                    skyContent.classList.add('visible');
                }, 1500);

            }, 5000);

            setTimeout(function() {
                if (currentPhase === 4) {
                    var bloodOverlay = skyContent.querySelector('.blood-overlay');
                    if (bloodOverlay) bloodOverlay.classList.add('show');

                    var moonEl = document.querySelector('.moon');
                    if (moonEl) moonEl.classList.add('blood-moon');

                    var staticNoiseEl = document.getElementById('static-noise');
                    var skyMsgEl = document.querySelector('.sky-message');
                    var ghostDoubleEl = document.querySelector('.ghost-double');

                    if (skyMsgEl) skyMsgEl.classList.add('curdling');
                    if (ghostDoubleEl) ghostDoubleEl.classList.add('show');

                    setTimeout(function() {
                        if (staticNoiseEl) {
                            staticNoiseEl.classList.add('flash');
                            setTimeout(function() {
                                staticNoiseEl.classList.remove('flash');
                            }, 220);
                        }
                    }, 2000);

                    setTimeout(function() {
                        if (ghostDoubleEl) ghostDoubleEl.classList.remove('show');
                        if (staticNoiseEl) staticNoiseEl.classList.remove('flash');

                        skyContent.classList.remove('visible');
                        fadeOutAndStop(sndAmbience, 1200);

                        setTimeout(function() {
                            var finalScreen = document.getElementById('final-screen');
                            finalScreen.style.opacity = '1';
                            finalScreen.style.pointerEvents = 'auto';

                            setTimeout(function() {
                                playWithFadeIn(sndLoveAir1, 39, 0.15, 6000);
                                crossfadeBeforeEnd(sndLoveAir1, sndLoveAir2, 4, 0.15, 4000);
                            }, 3000);

                            setTimeout(function() {
                                showFinalLetter();
                            }, 5000);
                        }, 3000);
                    }, 4200);
                    return;
                }

                skyContent.classList.remove('visible');
                wrapper.classList.remove('camera-up');

                setTimeout(function() {
                    currentPhase++;
                    updateRuleFacesForPhase(currentPhase);
                    isSecondRead = true;

                    bookWrap.classList.remove('hidden');
                    bookWrap.classList.add('visible');
                    bookWrap.classList.remove('open');

                    var allLeaves = book.querySelectorAll('.leaf');
                    allLeaves.forEach(function(l) {
                        if (Number(l.dataset.index) !== 0) {
                            var textEl = l.querySelector('.typewriter-text');
                            var hint = l.querySelector('.page-hint');
                            var mark = l.querySelector('.closing-mark');
                            // Clear text and remove caret
                            if (textEl) {
                                var caret = textEl.querySelector('.caret');
                                if (caret) caret.remove();
                                textEl.textContent = '';
                            }
                            if (hint) hint.classList.remove('show');
                            if (mark) mark.classList.remove('show');
                            // remove typing lock
                            delete l.dataset.typing;
                            l.classList.add('locked');
                        }
                    });

                    var firstLeaf = book.querySelector('.leaf[data-index="0"]');
                    if (firstLeaf) firstLeaf.classList.remove('locked');
                    activeIndex = 0;

                }, 1400);
            }, 5000 + 1500 + 4000);
        }

        /* ============================================================
           FINAL STAGE UNVEIL (Long Letter)
           ============================================================ */
        function revealBloodBackground() {
            var finalScreen = document.getElementById('final-screen');
            finalScreen.style.opacity = '1';
            finalScreen.style.pointerEvents = 'auto';
        }

        function fitFinalText(container, fullText) {
            var maxSizeRem = 1.0;
            var minSizeRem = 0.55;
            var stepRem = 0.05;

            container.style.fontSize = maxSizeRem + 'rem';
            container.textContent = fullText;

            var size = maxSizeRem;
            while (container.scrollHeight > container.clientHeight && size > minSizeRem) {
                size -= stepRem;
                container.style.fontSize = size + 'rem';
            }

            container.textContent = '';
            return size;
        }
        
        let finalLetterTypingStarted = false;

       function showFinalLetter() {
            if (finalLetterTypingStarted) return;
            finalLetterTypingStarted = true;

            var finalCard = document.getElementById('final-card');
            if (finalCard) finalCard.classList.add('show');

            // Now you can write it as one block of text!
            // Use \n only when you want a new paragraph.
            var finalLetterText = 
        `To my dearest Cara,

        Happy 5th Monthsary, my love. Five months of having you in my life, and honestly, every single rule of my universe has completely changed. I'm writing this to you because I wanted to create something completely ours, a quiet space where I could try—even if words will always fall short—to tell you just how much you mean to me.

        First, I want to say thank you. Thank you for staying by my side through absolutely everything, through every single up and down, and for being so deeply committed to us. I know I can be a handful sometimes, and I am so incredibly sorry for the moments when I am hard to deal with or when things get overwhelming. But please know that through every single second of these past five months, I have been so deeply, genuinely happy. Being loved by you is the greatest thing that has ever happened to me.

        I want to be completely honest and vulnerable with you about something. Just today, right before our monthsary, when we were both playing and we had that fight... it hurt so badly. When we were arguing and those mean things were said in the heat of anger, I couldn't help but cry. It wasn't just because of the argument itself, Cara. The real reason my heart broke and the tears wouldn't stop was because right at that exact moment, while we were playing, I was secretly working on this very website for you. I was right here, crafting these pages and writing this letter, trying to build something beautiful to surprise you and make you smile. It felt so incredibly bitter and overwhelming to be pouring my heart into a celebration of us while we were hurting. It broke me because all I wanted was to make you happy.

        But even in that heavy moment, it only made me realize how much I never want to lose you. It proved to me how deeply I care, and how much our bond matters to me. Arguments will happen, and we will face rough days, but the fact that you are still here, that we always find our way back, and that you stay committed to us through the storm means the entire world to me. You are my safe space, my anchor, and my home.

        If I could have one absolute wish for us—kind of like that movie Obsession where Bear wishes for Nikki to love him more than anyone else in the world, but without any of the craziness, just pure, wholesome devotion... my wish would be this: 

        I wish that as time goes on, your heart finds a love in me so deep, so safe, and so completely fulfilling that you never have to wonder what it feels like to be entirely cherished. I wish for me to be the person who makes you feel safer, happier, and more loved than anyone else ever could, and I wish for us to keep choosing each other, over and over again, growing closer with every single chapter we write. I want to spend forever making sure you know that you are my absolute everything.

        Thank you for these beautiful five months, Cara. Thank you for your patience, your commitment, and your love. 

        Happy 5 Monthsary, my baby. Forever and always, yours.`;

            var txtContainer = document.getElementById('final-text');
            
            // Remove the fitFinalText() call as it was interfering with auto-wrap
            txtContainer.textContent = ''; 

            var characterIndex = 0;

           function typeFinal() {
                if (characterIndex >= finalLetterText.length) {
                    stopTypeBlip();
                    return;
                }

                var char = finalLetterText[characterIndex];
                
                // Determine the delay and if we should pause BEFORE playing the sound
                var delay = TYPING_SPEED_MS_FINAL;
                var shouldPause = false;

                if (char === '\n') {
                    delay = PAUSE_AFTER_LINE_MS;
                    shouldPause = true;
                } else if (char === '.') {
                    delay = PAUSE_AFTER_DOT_MS;
                    shouldPause = true;
                } else if (char === ',') {
                    delay = typeof PAUSE_AFTER_COMMA_MS !== 'undefined' ? PAUSE_AFTER_COMMA_MS : 180;
                    shouldPause = true;
                }

                // If it's a pause character, kill the sound immediately and don't trigger a new blip
                if (shouldPause) {
                    stopTypeBlip();
                } else {
                    ensureBlipPlaying(0.30);
                }

                // Append the character
                txtContainer.textContent += char; 
                characterIndex++;

                // Handle the timeout transition
                if (shouldPause) {
                    setTimeout(function() {
                        typeFinal();
                    }, delay);
                } else {
                    setTimeout(typeFinal, delay);
                }
            }

            setTimeout(typeFinal, 900);
        }

        /* ============================================================
           CLOSE BOOK (normal mode)
           ============================================================ */
        function closeBook() {
            if (isClosing) return;
            isClosing = true;

            var allLeaves = book.querySelectorAll('.leaf');
            allLeaves.forEach(function(l) { l.classList.add('locked'); });

            var flippedLeaves = [];
            allLeaves.forEach(function(l) {
                if (l.classList.contains('flipped')) {
                    flippedLeaves.push(l);
                }
            });
            flippedLeaves.sort(function(a, b) {
                return Number(b.dataset.index) - Number(a.dataset.index);
            });

            var total = flippedLeaves.length;
            if (total === 0) {
                setTimeout(function() {
                    resetAndSurprise();
                }, 300);
                return;
            }

            if (sndPageTurn) {
                sndPageTurn.currentTime = 0;
                sndPageTurn.volume = 0.5;
                sndPageTurn.play().catch(function() {});
            }

            var delayBetween = 300;
            if (DEBUG_MODE) delayBetween = 20;

            flippedLeaves.forEach(function(leaf, idx) {
                setTimeout(function() {
                    leaf.classList.remove('flipped');
                    leaf.style.zIndex = 500 - Number(leaf.dataset.index);
                    if (idx === flippedLeaves.length - 1) {
                        setTimeout(function() {
                            resetAndSurprise();
                        }, 400);
                    }
                }, idx * delayBetween);
            });
        }

        /* ============================================================
           RESET & SURPRISE (normal mode)
           ============================================================ */
        function resetAndSurprise() {
            bookWrap.classList.remove('open');
            activeIndex = 0;

            var allLeaves = book.querySelectorAll('.leaf');
            allLeaves.forEach(function(l) {
                var idx = Number(l.dataset.index);
                l.style.zIndex = 500 - idx;
                l.classList.remove('flipped');
                if (idx === 0) {
                    l.classList.remove('locked');
                } else {
                    l.classList.add('locked');
                }
                var hint = l.querySelector('.page-hint');
                if (hint) hint.classList.remove('show');
                var mark = l.querySelector('.closing-mark');
                if (mark) mark.classList.remove('show');
                var textEl = l.querySelector('.typewriter-text');
                if (textEl) {
                    var caret = textEl.querySelector('.caret');
                    if (caret) caret.remove();
                    textEl.textContent = '';
                }
                delete l.dataset.typing;
            });
            flipZ = 1000;
            isClosing = false;

            startSkySurprise();
        }

        /* ============================================================
           PAGE TURN (normal mode)
           ============================================================ */
        function handleLeafClick(leaf, index) {
            if (isClosing) return;
            if (leaf.classList.contains('locked') || leaf.classList.contains('flipped')) return;
            if (Number(leaf.dataset.index) !== activeIndex) return;

            if (index === RULES.length + 1 && !leaf.classList.contains('flipped')) {
                closeBook();
                return;
            }

            if (index > RULES.length) return;

            if (index === 0) {
                if (currentPhase >= 2 && currentPhase <= 4) {
                    startPhaseAudio(currentPhase);
                    flashPhaseBackground(currentPhase);
                }
            }

            if (sndPageTurn) {
                sndPageTurn.currentTime = 0;
                sndPageTurn.play().catch(function() {});
            }

            leaf.classList.add('flipped');
            leaf.style.zIndex = flipZ++;

            if (index === 0) {
                bookWrap.classList.add('open');
            }

            activeIndex++;

            var nextLeaf = book.querySelector('.leaf[data-index="' + (index + 1) + '"]');
            if (nextLeaf) {
                var nextIsClosingLeaf = (index + 1) > RULES.length;
                var message = getMessage(index, nextIsClosingLeaf);

                var halfFlip = FLIP_DURATION_MS * 0.5;
                if (DEBUG_MODE) halfFlip = 50;
                setTimeout(function() {
                    startTypewriter(nextLeaf, message, nextIsClosingLeaf);
                }, halfFlip);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        if (!IS_END_MODE) {
            updateSkyMessage(PHASESTART);
        }
