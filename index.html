<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Love Note</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Dancing+Script:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           CUSTOM FONTS from /Fonts folder
           ============================================================ */
        @font-face {
            font-family: 'RyukExtra';
            src: url('Fonts/RyukExtra.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'DeathFont';
            src: url('Fonts/DeathFont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'RyukExtra2';
            src: url('Fonts/RyukExtra2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'DeathFont2';
            src: url('Fonts/DeathFont2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ============================================================
           ROOT / RESET
           ============================================================ */
        :root {
            --void: #000;
            --charcoal: #0b0b0c;
            --leather: #000000;
            --leather-hi: #232025;
            --blood: #7a0f16;
            --blood-bright: #b3141c;
            --parchment: #f4ebd0;
            --parchment-dark: #e8dcb8;
            --ink: #2b2420;
            --ash: #cfcad0;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--void);
            overflow: hidden;
            font-family: 'EB Garamond', serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ============================================================
           INTRO TRIGGER GATEWAY
           ============================================================ */
        #intro-gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void);
            transition: opacity 1.5s ease;
        }
        #intro-gate.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .gate-text {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            font-weight: 400;
            text-transform: lowercase;
            transition: color 0.3s ease;
            text-align: center;
            max-width: 90vw;
            padding: 0 1rem;
        }
        .gate-text:hover {
            color: rgba(255, 255, 255, 0.85);
        }
        .gate-text.mobile-message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            text-transform: none;
            cursor: default;
            pointer-events: none;
            line-height: 1.6;
            font-family: 'Dancing Script', cursive;
            font-weight: 500;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
        }

        /* ============================================================
           STAGE & WRAPPER, long, smooth camera tilt
           ============================================================ */
        #stage {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 10;
            background: var(--void);
        }

        #wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200vh;
            transform: translateY(-50vh);
            transition: transform 5s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
            background:
                radial-gradient(ellipse at 50% 60%, #0a0a0c 0%, #000 100%);
        }
        #wrapper.camera-up {
            transform: translateY(0vh);
        }

        #wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(11, 14, 42, 0.95) 0%,
                    rgba(10, 10, 12, 0.8) 30%,
                    transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
           SKY CONTENT, full, beautiful, fills viewport
           ============================================================ */
        #sky-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            transition: opacity 1.8s ease;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 40%, #0f1428 0%, #070915 60%, #000 100%);
        }
        #sky-content::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 100%, rgba(60, 30, 80, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 30% 20%, rgba(40, 50, 100, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        #sky-content.visible {
            opacity: 1;
        }

        /* Bleeds the blue night sky into blood-red before the final fade to black (phase 4 only) */
        .blood-overlay {
            position: absolute;
            inset: 0;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 55%, rgba(179, 20, 28, 0.55) 0%, rgba(90, 8, 12, 0.75) 45%, rgba(0, 0, 0, 0.96) 100%);
            transition: opacity 4s ease-in;
        }
        .blood-overlay.show {
            opacity: 1;
        }

        .moon {
            width: clamp(100px, 22vw, 200px);
            height: clamp(100px, 22vw, 200px);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #d0d8ff);
            box-shadow:
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 80px rgba(255, 255, 255, 0.15),
                0 0 160px rgba(255, 255, 255, 0.08);
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
            transition: background 4s ease, box-shadow 4s ease;
        }
        /* Blood moon, the moon curdles from white/blue to red as the sky bleeds (phase 4) */
        .moon.blood-moon {
            background: radial-gradient(circle at 30% 30%, #ff5a4d, #7a0f16);
            box-shadow:
                0 0 40px rgba(179, 20, 28, 0.5),
                0 0 90px rgba(122, 15, 22, 0.32),
                0 0 180px rgba(90, 8, 12, 0.2);
        }

        /* Text curdle, the message slowly bleeds toward blood-red, still and unnerving (no jitter) */
        .sky-message .main,
        .sky-message .sub {
            transition: filter 4s ease, color 4s ease;
        }
        .sky-message.curdling .main {
            filter: sepia(1) saturate(6) hue-rotate(-40deg) brightness(0.85);
        }
        .sky-message.curdling .sub {
            color: rgba(200, 40, 40, 0.85);
            -webkit-text-fill-color: rgba(200, 40, 40, 0.85);
        }

        /* Ghost double, a faint, slightly-offset duplicate that lingers behind the text, like something else is there */
        .sky-message {
            position: relative;
        }
        .ghost-double {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            color: rgba(179, 20, 28, 0.5);
            transform: translate(3px, 2px) scale(1.01);
            filter: blur(1px);
            transition: opacity 2.6s ease-in-out;
            z-index: -1;
        }
        .ghost-double.show {
            opacity: 0.55;
        }
        .ghost-double .main,
        .ghost-double .sub {
            font-family: 'Dancing Script', cursive;
            -webkit-text-fill-color: currentColor;
            background: none;
        }
        .ghost-double .main {
            font-size: clamp(2.2rem, 9vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        .ghost-double .sub {
            font-size: clamp(1.1rem, 4.5vw, 2.5rem);
            font-style: italic;
            margin-top: 0.5rem;
        }

        /* Static/noise flash overlay */
        #static-noise {
            position: fixed;
            inset: 0;
            z-index: 45;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size: 220px 220px;
            transition: opacity 0.06s linear;
        }
        #static-noise.flash {
            opacity: 0.32;
        }
        .moon::after {
            content: "";
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(200, 210, 255, 0.12);
            filter: blur(10px);
        }
        .moon::before {
            content: "";
            position: absolute;
            bottom: 20%;
            right: 15%;
            width: 15%;
            height: 15%;
            border-radius: 50%;
            background: rgba(180, 190, 240, 0.08);
            filter: blur(6px);
        }

        .sky-message {
            font-family: 'Dancing Script', cursive;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.15), 0 0 80px rgba(255, 255, 255, 0.05);
            padding: 0 1rem;
            position: relative;
            z-index: 2;
            transition: opacity 0.6s ease;
        }
        .sky-message .main {
            font-size: clamp(2.2rem, 9vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1.3;
            background: linear-gradient(to right, #fff, #e0e8ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .sky-message .sub {
            font-size: clamp(1.1rem, 4.5vw, 2.5rem);
            font-weight: 400;
            opacity: 0.85;
            margin-top: 0.5rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
            -webkit-text-fill-color: rgba(255, 255, 255, 0.9);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: twinkle 2.5s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 0.9;
                transform: scale(1.2);
            }
        }

        /* ============================================================
           VERTICAL WIND STREAKS, fade out naturally
           ============================================================ */
        .wind-streak {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4), transparent);
            border-radius: 2px;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            animation: windFall 0.9s linear forwards;
        }
        @keyframes windFall {
            0% {
                opacity: 0.6;
                transform: translateY(-100px);
            }
            100% {
                opacity: 0;
                transform: translateY(calc(100vh + 100px));
            }
        }

        /* ============================================================
           BOOK CONTAINER, properly centered, no glow
           ============================================================ */
        #book-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(84vw, 355px);
            height: min(116vw, 515px);
            transform: translate(-50%, -50%) scale(0.92);
            opacity: 0;
            transform-style: preserve-3d;
            perspective: 2200px;
            perspective-origin: 50% 50%;
            will-change: transform, opacity;
            z-index: 10;
            transition: opacity 2.4s ease, transform 1.7s cubic-bezier(0.65, 0.05, 0.36, 1);
        }
        #book-wrap.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #book-wrap.open {
            transform: translate(0%, -50%) scale(1);
        }
        #book-wrap.hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        #book-wrap::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -14%;
            width: 120%;
            height: 22%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at center, rgba(179, 20, 28, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(6px);
            pointer-events: none;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* ============================================================
           LEAVES
           ============================================================ */
        .leaf {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            cursor: pointer;
            transform: rotateY(0deg);
            transition: transform 1.7s cubic-bezier(0.65, 0.05, 0.36, 1);
            will-change: transform;
        }
        .leaf.flipped {
            transform: rotateY(-180deg);
            pointer-events: none;
        }
        .leaf.locked {
            cursor: default;
            pointer-events: none;
        }

        .face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
        }
        .face-front {
            border-radius: 2px 8px 8px 2px;
        }
        .face-back {
            border-radius: 8px 2px 2px 8px;
            transform: rotateY(180deg);
        }

        .parchment {
            background:
                radial-gradient(ellipse 140% 110% at 50% 50%, rgba(255, 255, 255, 0.05), transparent 80%),
                linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.1);
        }
        .parchment::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                repeating-radial-gradient(circle at 10% 20%, rgba(120, 95, 45, 0.05) 0px, transparent 2px),
                repeating-radial-gradient(circle at 70% 60%, rgba(120, 95, 45, 0.05) 0px, transparent 2px),
                repeating-radial-gradient(circle at 40% 85%, rgba(120, 95, 45, 0.05) 0px, transparent 3px);
            background-size: 6px 6px, 9px 9px, 7px 7px;
            mix-blend-mode: multiply;
            opacity: .85;
        }
        .parchment::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 16% 84%, rgba(120, 70, 28, 0.28) 0%, transparent 24%),
                radial-gradient(circle at 84% 10%, rgba(101, 58, 18, 0.22) 0%, transparent 28%),
                radial-gradient(circle at 55% 96%, rgba(90, 54, 14, 0.20) 0%, transparent 20%),
                radial-gradient(circle at 6% 28%, rgba(80, 50, 15, 0.16) 0%, transparent 18%),
                radial-gradient(circle at 92% 62%, rgba(70, 42, 12, 0.14) 0%, transparent 16%),
                repeating-linear-gradient(to bottom,
                    transparent 0,
                    transparent 1.7em,
                    rgba(70, 50, 20, 0.11) 1.7em,
                    rgba(70, 50, 20, 0.11) calc(1.7em + 1px)),
                radial-gradient(ellipse at center, transparent 52%, rgba(60, 40, 15, 0.235) 100%);
            mix-blend-mode: multiply;
        }

        .leather {
            background-color: #000 !important;
            background-image: none !important;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .leather::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 3px),
                repeating-linear-gradient(25deg, rgba(0, 0, 0, 0.25) 0px, rgba(0, 0, 0, 0.25) 1px, transparent 1px, transparent 4px);
            opacity: .5;
            mix-blend-mode: overlay;
        }
        .leather::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.06), transparent 55%);
        }

        /* ============================================================
           TYPOGRAPHY & CONTENT (inside book), with custom fonts
           ============================================================ */
        .rule-inner,
        .msg-inner {
            position: relative;
            z-index: 2;
            height: 100%;
        }
        .rule-inner {
            padding: 9% 8% 9% 12%;
            color: rgba(43, 36, 32, 0.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .rule-title {
            font-family: 'DeathFont', 'Cinzel', serif;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            letter-spacing: 0.12em;
            color: var(--blood);
            font-weight: 700;
            margin: 0 0 0.6em 0;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(122, 15, 22, 0.35);
            padding-bottom: 0.4em;
        }
        .rule-line {
            font-family: 'DeathFont2', 'EB Garamond', serif;
            font-size: clamp(1rem, 2.8vw, 1.4rem);
            line-height: 1.8;
            font-style: italic;
            font-weight: 400;
            color: rgba(43, 36, 32, 0.85);
        }

        .msg-inner {
            padding: 11% 12% 8% 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .typewriter-text {
            font-family: 'RyukExtra', 'Dancing Script', cursive;
            font-weight: normal;
            font-size: clamp(1.0rem, 3.4vw, 1.45rem);
            line-height: 1.55;
            color: var(--ink);
            text-shadow: 0 0 1px rgba(43, 36, 32, 0.15);
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            margin: 0;
            width: 100%;
        }

        .caret {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--ink);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.85s steps(1) infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .page-hint {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 6%;
            text-align: center;
            font-family: 'RyukExtra2', 'EB Garamond', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.08em;
            color: rgba(0, 0, 0, 0.65);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .page-hint.show {
            opacity: 1;
            animation: pulseHint 2.6s ease-in-out infinite;
        }
        @keyframes pulseHint {
            0%,
            100% {
                opacity: 0;
            }
            50% {
                opacity: .35;
            }
        }

        .cover-hint {
            position: absolute;
            bottom: 6%;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            color: rgba(230, 220, 210, 0.3);
            z-index: 2;
            animation: pulseHint 2.6s ease-in-out infinite;
            -webkit-user-select: none;
            user-select: none;
        }

        .closing-mark {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--blood);
            margin-top: 0.8em;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: none;
        }
        .closing-mark.show {
            display: block;
            opacity: 1;
            animation: heartGlow 2.4s ease-in-out infinite;
        }
        @keyframes heartGlow {
            0%,
            100% {
                text-shadow: 0 0 10px rgba(122, 15, 22, 0.35);
            }
            50% {
                text-shadow: 0 0 22px rgba(122, 15, 22, 0.75);
            }
        }

        /* ============================================================
           FINAL LETTER PANEL CONFIGURATIONS (Phase 5 Transition)
           ============================================================ */
        #final-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            background-image:
                radial-gradient(ellipse 55% 45% at 30% 30%, rgba(150, 20, 25, 0.40) 0%, transparent 62%),
                radial-gradient(ellipse 65% 55% at 70% 68%, rgba(90, 8, 12, 0.32) 0%, transparent 65%),
                radial-gradient(ellipse 90% 90% at 50% 50%, #070404 0%, #000 100%);
            background-size: 260% 260%, 260% 260%, 100% 100%;
            background-repeat: no-repeat;
            animation: bloodDrift 48s ease-in-out infinite alternate;
            opacity: 0;
            pointer-events: none;
            transition: opacity 6s ease;
            z-index: 60;
        }
        @keyframes bloodDrift {
            0%   { background-position: 12% 18%, 88% 82%, center; }
            22%  { background-position: 38% 58%, 58% 28%, center; }
            48%  { background-position: 64% 22%, 30% 70%, center; }
            71%  { background-position: 22% 74%, 78% 42%, center; }
            100% { background-position: 46% 34%, 54% 66%, center; }
        }
        #final-card {
            position: relative;
            width: min(95vw, 600px);
            height: min(150vw, 800px);
            background: url('deathnote-bpage-removebg.png') no-repeat center/cover;
            box-shadow: none;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 2.2s ease;
        }
        #final-card.show {
            opacity: 1;
        }

        #final-text {
            position: absolute;
            top: 24%;
            left: 10%;
            right: 10%;
            bottom: 8%;
            font-family: 'DeathFont2', 'EB Garamond', serif;
            font-size: clamp(0.8rem, 2.0vw, 1.05rem);
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.85);
            white-space: pre-wrap;     /* Keeps \n as paragraph breaks */
            word-wrap: break-word;     /* Forces long words to wrap */
            overflow-y: auto;          /* Enables scroll */
            scrollbar-width: none;     /* Hide scrollbar Firefox */
            -ms-overflow-style: none;  /* Hide scrollbar IE/Edge[cite: 1] */

            /* ADD THESE LINES TO MAKE IT UNSELECTABLE */
            -webkit-user-select: none;  /* Safari */
            -moz-user-select: none;     /* Firefox */
            -ms-user-select: none;      /* IE10+/Edge */
            user-select: none;          /* Standard */
        }

        /* Hides scrollbar for Chrome, Safari, and Opera */
        #final-text::-webkit-scrollbar {
            display: none;
        }

        /* RICH TEXT inside the final letter.
           DeathFont2 only ships a "normal" weight, so plain <b> can look weak
           (just browser faux-bold) — add a soft glow so emphasis still reads clearly. */

        /* ============================================================
           AMBIENCE FADE-IN (reusable)
           ============================================================ */
        function fadeInAmbience(audioElement, targetVolume, durationMs) {
            if (!audioElement) return;
            audioElement.volume = 0;
            audioElement.play().catch(function() {});

            var intervalStepMs = 50;
            var totalSteps = durationMs / intervalStepMs;
            var volumeIncrement = targetVolume / totalSteps;
            var currentStep = 0;

            var fadeInterval = setInterval(function() {
                currentStep++;
                if (audioElement.volume + volumeIncrement >= targetVolume) {
                    audioElement.volume = targetVolume;
                    clearInterval(fadeInterval);
                } else {
                    audioElement.volume += volumeIncrement;
                }
            }, intervalStepMs);
            return fadeInterval;
        }

        function fadeOutAndStop(audioElement, durationMs) {
            if (!audioElement || audioElement.paused) return;
            var steps = Math.max(1, Math.floor(durationMs / 50));
            var startVolume = audioElement.volume;
            var step = 0;
            var fadeInterval = setInterval(function() {
                step++;
                var newVolume = startVolume * (1 - step / steps);
                if (newVolume <= 0.01 || step >= steps) {
                    audioElement.volume = 0;
                    audioElement.pause();
                    audioElement.currentTime = 0;
                    clearInterval(fadeInterval);
                } else {
                    audioElement.volume = newVolume;
                }
            }, 50);
        }

        🎵 AUDIO CONFIGURATION SETTINGS (Tweak these numbers anytime!)
        ============================================================ */
        const MUSIC_MAX_VOLUME = 0.15;       // Maximum volume for the background tracks
        const PT1_START_TIME = 20;          // Seconds to skip at the beginning of Part 1 (starts at 20s)
        const INITIAL_FADE_DURATION = 5000; // Time in milliseconds for the initial volume fade-in (5s)
        const CROSSFADE_WINDOW = 15;        // Seconds before a track ends to trigger the next track (15s)


        /* ============================================================
        🎵 SEAMLESS CROSSFADING LOOP ENGINE
        ============================================================ */
        let crossfadeCheckInterval = null;

        function startLoveAirLoop() {
            // Reset audio states completely
            sndLoveAir1.pause();
            sndLoveAir2.pause();
            
            // Use the configurable start timestamp
            sndLoveAir1.currentTime = PT1_START_TIME; 
            sndLoveAir2.currentTime = 0;
            
            // Start at silence to prevent instant audio slamming
            sndLoveAir1.volume = 0; 
            sndLoveAir2.volume = 0;

            // Play Part 1 silently
            sndLoveAir1.play().catch(function(e) { console.log("Audio play blocked:", e); });

            // --- SMOOTH INITIAL FADE IN ---
            let initialFadeSteps = 20;
            let initialFadeStepTime = INITIAL_FADE_DURATION / initialFadeSteps;
            let initialStep = 0;
            
            let initialFadeInterval = setInterval(function() {
                initialStep++;
                sndLoveAir1.volume = Math.min(MUSIC_MAX_VOLUME, MUSIC_MAX_VOLUME * (initialStep / initialFadeSteps));
                if (initialStep >= initialFadeSteps) {
                    clearInterval(initialFadeInterval);
                }
            }, initialFadeStepTime);
            // ------------------------------

            let triggeredPt2 = false;
            let triggeredPt1 = false;

            if (crossfadeCheckInterval) clearInterval(crossfadeCheckInterval);

            crossfadeCheckInterval = setInterval(function() {
                // --- CASE A: Part 1 is running, check remaining time ---
                if (!sndLoveAir1.paused && sndLoveAir1.duration) {
                    let timeLeft1 = sndLoveAir1.duration - sndLoveAir1.currentTime;
                    
                    // Uses CROSSFADE_WINDOW configuration (e.g., 15 seconds)
                    if (timeLeft1 <= CROSSFADE_WINDOW && !triggeredPt2) {
                        triggeredPt2 = true;
                        triggeredPt1 = false; 
                        
                        sndLoveAir2.currentTime = 0;
                        sndLoveAir2.volume = 0;
                        sndLoveAir2.play().catch(function() {});
                        
                        // Convert configuration seconds to milliseconds for the fader
                        fadeAudioTracks(sndLoveAir1, sndLoveAir2, CROSSFADE_WINDOW * 1000, MUSIC_MAX_VOLUME);
                    }
                }

                // --- CASE B: Part 2 is running, check remaining time ---
                if (!sndLoveAir2.paused && sndLoveAir2.duration) {
                    let timeLeft2 = sndLoveAir2.duration - sndLoveAir2.currentTime;
                    
                    // Uses CROSSFADE_WINDOW configuration (e.g., 15 seconds)
                    if (timeLeft2 <= CROSSFADE_WINDOW && !triggeredPt1) {
                        triggeredPt1 = true;
                        triggeredPt2 = false; 
                        
                        // Force Part 1 back to its starting mark on loopback
                        sndLoveAir1.currentTime = PT1_START_TIME; 
                        sndLoveAir1.volume = 0;
                        sndLoveAir1.play().catch(function() {});
                        
                        // Convert configuration seconds to milliseconds for the fader
                        fadeAudioTracks(sndLoveAir2, sndLoveAir1, CROSSFADE_WINDOW * 1000, MUSIC_MAX_VOLUME);
                    }
                }
            }, 500); 
        }

        function fadeAudioTracks(fadeOutTrack, fadeInTrack, durationMs, maxVolume) {
            let steps = 60; 
            let stepTime = durationMs / steps;
            let currentStep = 0;

            let fadeInterval = setInterval(function() {
                currentStep++;
                let progress = currentStep / steps;

                fadeOutTrack.volume = Math.max(0, maxVolume * (1 - progress));
                fadeInTrack.volume = Math.min(maxVolume, maxVolume * progress);

                if (currentStep >= steps) {
                    clearInterval(fadeInterval);
                    fadeOutTrack.pause(); 
                }
            }, stepTime);
        }

        function playWithFadeIn(audioElement, startAtSeconds, targetVolume, fadeMs) {
            if (!audioElement) return;

            function start() {
                try {
                    audioElement.currentTime = startAtSeconds;
                } catch (e) {}
                fadeInAmbience(audioElement, targetVolume, fadeMs);
            }
            if (audioElement.readyState >= 1) {
                start();
            } else {
                audioElement.addEventListener('loadedmetadata', start, { once: true });
            }
        }

        function crossfadeBeforeEnd(currentTrack, nextTrack, secondsBeforeEnd, targetVolume, fadeMs) {
            if (!currentTrack || !nextTrack) return;
            var triggered = false;

            function onTimeUpdate() {
                if (triggered) return;
                if (!isNaN(currentTrack.duration) &&
                    currentTrack.duration - currentTrack.currentTime <= secondsBeforeEnd) {
                    triggered = true;
                    currentTrack.removeEventListener('timeupdate', onTimeUpdate);
                    fadeOutAndStop(currentTrack, fadeMs);
                    playWithFadeIn(nextTrack, 0, targetVolume, fadeMs);
                }
            }
            currentTrack.addEventListener('timeupdate', onTimeUpdate);
        }

            var color = PHASE_FLASH_COLORS[phase];
            if (!color) return;

            phaseFlash.style.transition = 'none';
            phaseFlash.style.backgroundColor = color;
            phaseFlash.style.opacity = '1';

            void phaseFlash.offsetHeight;

            phaseFlash.style.transition = 'opacity ' + PHASE_FLASH_FADE_MS + 'ms ease, background-color ' +

        /* ============================================================
           GET RULES AND MESSAGES FOR CURRENT PHASE
           ============================================================ */
        function getRulesForPhase(phase) {
            if (phase === 1) return RULES;
            if (phase === 2) return RULES_SECOND;
            if (phase === 3) return RULES_THIRD;
            if (phase === 4) return RULES_FOURTH;
            return RULES_FOURTH;
        }

        function getFinalMessageForPhase(phase) {
            if (phase === 1) return FINAL_MESSAGE;
            if (phase === 2) return FINAL_MESSAGE_SECOND;
            if (phase === 3) return FINAL_MESSAGE_THIRD;
            if (phase === 4) return FINAL_MESSAGE_FOURTH;
            return FINAL_MESSAGE_FOURTH;
        }

        function getRuleTextForPhase(phase, index) {
            var rules = getRulesForPhase(phase);
            if (index < rules.length) return rules[index].ruleText;
            return "No rule written yet.";
        }

        function getMessageForPhase(phase, index) {
            var rules = getRulesForPhase(phase);
            if (index < rules.length) return rules[index].message;
            return "No message written yet.";
        }

        function updateRuleFacesForPhase(phase) {
            var allLeaves = book.querySelectorAll('.leaf');
            allLeaves.forEach(function(l) {
                var idx = Number(l.dataset.index);
                if (idx < RULES.length) {
                    var titleEl = l.querySelector('.rule-title');
                    var lineEl = l.querySelector('.rule-line');
                    var roman = getRulesForPhase(phase)[idx]?.roman || (idx + 1);
                    var ruleText = getRuleTextForPhase(phase, idx);
                    if (titleEl) titleEl.textContent = "Rule " + roman;
                    if (lineEl) lineEl.textContent = ruleText;
                }
            });
        }

                        console.log("Audio play error:", err);
                    });

                    setTimeout(function() {
                        var fadeStartTime = performance.now();
                        var fadeDuration = 10000;
                        var initialVolume = 0.3;

                        var fadeOutInterval = setInterval(function() {
                            var now = performance.now();
                            var elapsed = now - fadeStartTime;
                            var progress = Math.min(elapsed / fadeDuration, 1);
                            var newVolume = initialVolume * (1 - progress);
                            sndFadeIn.volume = Math.max(0, newVolume);

                            if (progress >= 1) {
                                sndFadeIn.volume = 0;
                                sndFadeIn.pause();
                                sndFadeIn.currentTime = 0;
                                clearInterval(fadeOutInterval);
                            }
                        }, 50);
                    }, 2500);
                }

                if (sndAmbience) {
                    setTimeout(function() {
                        fadeInAmbience(sndAmbience, 0.15, 4500);
                    }, 800);

                if (sndLawliet && PHASESTART === 1) {

        function buildLeaf(index) {

                var roman = getRulesForPhase(currentPhase)[index]?.roman || (index + 1);
                back = buildRuleFace(roman, ruleText);
            } else if (index === RULES.length) {

            } else {

            leaf.appendChild(front);

            book.appendChild(leaf);

                handleLeafClick(leaf, index);

            leaf.addEventListener('touchend', function(e) {
                e.preventDefault();

        /* ============================================================
           TYPEWRITER, ORIGINAL STYLE, with locking and blip
           ============================================================ */
        function startTypewriter(leaf, message, isClosingLeaf) {
            // Prevent re-entry
            if (leaf.dataset.typing === "true") return;
            leaf.dataset.typing = "true";

            var textEl = leaf.querySelector('.typewriter-text');
            var hint = leaf.querySelector('.page-hint');
            var mark = leaf.querySelector('.closing-mark');

            // Reset: remove any leftover caret, clear text, hide hints
            var oldCaret = textEl.querySelector('.caret');
            if (oldCaret) oldCaret.remove();

            // If it's a second read, we clear everything
            if (isSecondRead) {
                textEl.textContent = '';
                if (hint) hint.classList.remove('show');
                if (mark) mark.classList.remove('show');
            }

            // Check if the message is already fully typed (e.g., from a previous read)
            // We only skip if the text is non-empty and we're NOT doing a second read.
            var existingText = textEl.textContent.replace(/\s/g, '');
            if (existingText.length > 0 && !isSecondRead) {
                // Already typed, just show hint and unlock
                if (isClosingLeaf) {
                    if (mark) mark.classList.add('show');
                } else {
                    if (hint) hint.classList.add('show');
                }
                leaf.classList.remove('locked');
                delete leaf.dataset.typing;
                return;
            }

            // Clear any previous text (for second read, it's already cleared)
            if (!isSecondRead) {
                textEl.textContent = '';
            }

            // Add a caret
            var caret = document.createElement('span');
            caret.className = 'caret';
            textEl.appendChild(caret);

            var i = 0;

            function typeNext() {
                if (i >= message.length) {
                    // Done typing
                    stopTypeBlip();
                    // Remove caret
                    var c = textEl.querySelector('.caret');
                    if (c) c.remove();
                    // Show hint or mark
                    if (isClosingLeaf) {
                        if (mark) mark.classList.add('show');
                    } else {
                        if (hint) hint.classList.add('show');
                    }
                    leaf.classList.remove('locked');
                    delete leaf.dataset.typing;
                    return;
                }

                var char = message[i];

                // Ensure blip is playing (it will be started on first char)
                ensureBlipPlaying(0.235);

                // Append the character
                textEl.textContent = message.slice(0, i + 1);
                // Re-append the caret
                var c = textEl.querySelector('.caret');
                if (c) {
                    // Caret exists, move to end
                    textEl.appendChild(c);
                } else {
                    // Shouldn't happen, but just in case
                    var newCaret = document.createElement('span');
                    newCaret.className = 'caret';
                    textEl.appendChild(newCaret);
                }

                i++;

                // Determine pause
                var delay = TYPING_SPEED_MS;
                var shouldPause = false;

                if (char === '\n') {
                    delay = PAUSE_AFTER_LINE_MS;
                    shouldPause = true;
                } else if (char === '.') {
                    delay = PAUSE_AFTER_DOT_MS;
                    shouldPause = true;
                }

                if (shouldPause) {
                    // Stop the blip during pause
                    stopTypeBlip();
                    setTimeout(function() {
                        typeNext();
                    }, delay);
                } else {
                    setTimeout(typeNext, delay);
                }
            }

            // Start the typing
            typeNext();
        }

        function getMessage(index, isClosingLeaf) {
            if (isClosingLeaf) {
                return getFinalMessageForPhase(currentPhase);
            } else {
                return getMessageForPhase(currentPhase, index);

        }

        /* ============================================================
           FINAL STAGE UNVEIL (Long Letter)
           ============================================================ */
        function revealBloodBackground() {

        function fitFinalText(container, fullText) {
            var maxSizeRem = 1.0;
            var minSizeRem = 0.55;
            var stepRem = 0.05;

            container.style.fontSize = maxSizeRem + 'rem';
            container.textContent = fullText;

            var size = maxSizeRem;
            while (container.scrollHeight > container.clientHeight && size > minSizeRem) {
                size -= stepRem;
                container.style.fontSize = size + 'rem';
            }

            container.textContent = '';
            return size;
        }
        
        let finalLetterTypingStarted = false;

       function showFinalLetter() {
            if (finalLetterTypingStarted) return;
            finalLetterTypingStarted = true;

            var finalCard = document.getElementById('final-card');
            if (finalCard) finalCard.classList.add('show');
            
            const finalLetterText = MY_CUSTOM_LETTER;

            var txtContainer = document.getElementById('final-text');
            
            // Remove the fitFinalText() call as it was interfering with auto-wrap
            txtContainer.textContent = ''; 

            var characterIndex = 0;
            var htmlBuffer = ''; // rendered HTML (lets us support real tags, not just plain chars)

           function typeFinal() {
                if (characterIndex >= finalLetterText.length) {
                    stopTypeBlip();
                    return;
                }

                var char = finalLetterText[characterIndex];

                // RICH TEXT TAGS: anything like <b>, </b>, <i>, </i>,
                // <span style="color:#ff6b81"> gets inserted instantly and silently —
                // no typing sound, no delay — so only the text inside visibly "types".
                if (char === '<') {
                    var closeIdx = finalLetterText.indexOf('>', characterIndex);
                    if (closeIdx !== -1) {
                        htmlBuffer += finalLetterText.slice(characterIndex, closeIdx + 1);
                        txtContainer.innerHTML = htmlBuffer;
                        characterIndex = closeIdx + 1;
                        typeFinal(); // jump straight to the next char, no pause
                        return;
                    }
                }

                // INVISIBLE PAUSE: "|" is never shown on screen. It just holds the
                // typewriter for a beat, then continues. Use it for dramatic timing.
                if (char === '|') {
                    stopTypeBlip();
                    characterIndex++;
                    setTimeout(typeFinal, PAUSE_AFTER_BAR_MS);
                    return;
                }
                
                // Determine the delay and if we should pause BEFORE playing the sound
                var delay = TYPING_SPEED_MS_FINAL;
                var shouldPause = false;

                if (char === '\n') {
                    delay = PAUSE_AFTER_LINE_MS;
                    shouldPause = true;
                } else if (char === '.') {
                    delay = PAUSE_AFTER_DOT_MS;
                    shouldPause = true;
                } else if (char === ',') {
                    delay = typeof PAUSE_AFTER_COMMA_MS !== 'undefined' ? PAUSE_AFTER_COMMA_MS : 180;
                    shouldPause = true;
                }

                // If it's a pause character, kill the sound immediately and don't trigger a new blip
                if (shouldPause) {
                    stopTypeBlip();
                } else {
                    ensureBlipPlaying(0.235);
                }

                // Append the character
                htmlBuffer += char;
                txtContainer.innerHTML = htmlBuffer;
                characterIndex++;

                // Handle the timeout transition
                if (shouldPause) {
                    setTimeout(function() {
                        typeFinal();
                    }, delay);
                } else {
                    setTimeout(typeFinal, delay);
                }
            }

            setTimeout(typeFinal, 900);
        }

        /* ============================================================
        CLOSE BOOK (normal mode)
        ============================================================ */
        function closeBook() {
            if (isClosing) return;
            isClosing = true;

            var allLeaves = book.querySelectorAll('.leaf');
            allLeaves.forEach(function(l) { l.classList.add('locked'); });

            var flippedLeaves = [];
            allLeaves.forEach(function(l) {
                if (l.classList.contains('flipped')) {
                    flippedLeaves.push(l);
                }
            });
            flippedLeaves.sort(function(a, b) {
                return Number(b.dataset.index) - Number(a.dataset.index);
            });

            var total = flippedLeaves.length;
            if (total === 0) {
                setTimeout(function() {
                    resetAndSurprise();
                }, 300);
                return;
            }

            if (sndPageTurn) {
                sndPageTurn.currentTime = 0;
                sndPageTurn.volume = 0.5;
                sndPageTurn.play().catch(function() {});
            }

            var delayBetween = 300;
            if (DEBUG_MODE) delayBetween = 20;

            flippedLeaves.forEach(function(leaf, idx) {
                setTimeout(function() {
                    leaf.classList.remove('flipped');
                    leaf.style.zIndex = 500 - Number(leaf.dataset.index);
                    if (idx === flippedLeaves.length - 1) {
                        // FIXED: Changed 400 to FLIP_DURATION_MS so it waits for the 1.7s animation to finish
                        setTimeout(function() {
                            resetAndSurprise();
                        }, FLIP_DURATION_MS);
                    }
                }, idx * delayBetween);
            });
        }

        /* ============================================================
           RESET & SURPRISE (normal mode)
           ============================================================ */
        function resetAndSurprise() {
            bookWrap.classList.remove('open');
            activeIndex = 0;

            var allLeaves = book.querySelectorAll('.leaf');
            allLeaves.forEach(function(l) {
                var idx = Number(l.dataset.index);
                l.style.zIndex = 500 - idx;
                l.classList.remove('flipped');
                if (idx === 0) {
                    l.classList.remove('locked');
                } else {
                    l.classList.add('locked');
                }
                var hint = l.querySelector('.page-hint');
                if (hint) hint.classList.remove('show');
                var mark = l.querySelector('.closing-mark');
                if (mark) mark.classList.remove('show');
                var textEl = l.querySelector('.typewriter-text');
                if (textEl) {
                    var caret = textEl.querySelector('.caret');
                    if (caret) caret.remove();
                    textEl.textContent = '';
                }
                delete l.dataset.typing;
            });
            flipZ = 1000;
            isClosing = false;

            startSkySurprise();
        }

        /* ============================================================
           PAGE TURN (normal mode)
           ============================================================ */
        function handleLeafClick(leaf, index) {
            if (isClosing) return;
            if (leaf.classList.contains('locked') || leaf.classList.contains('flipped')) return;
            if (Number(leaf.dataset.index) !== activeIndex) return;

            if (index === RULES.length + 1 && !leaf.classList.contains('flipped')) {
                closeBook();
                return;
            }

            if (index > RULES.length) return;

            if (index === 0) {
                if (currentPhase >= 2 && currentPhase <= 4) {
                    startPhaseAudio(currentPhase);
                    flashPhaseBackground(currentPhase);
                }
            }

            if (sndPageTurn) {
                sndPageTurn.currentTime = 0;
                sndPageTurn.play().catch(function() {});
            }

            leaf.classList.add('flipped');
            leaf.style.zIndex = flipZ++;

            if (index === 0) {
                bookWrap.classList.add('open');
            }

            activeIndex++;

            var nextLeaf = book.querySelector('.leaf[data-index="' + (index + 1) + '"]');
            if (nextLeaf) {
                var nextIsClosingLeaf = (index + 1) > RULES.length;
                var message = getMessage(index, nextIsClosingLeaf);

                var halfFlip = FLIP_DURATION_MS * 0.5;
                if (DEBUG_MODE) halfFlip = 50;
                setTimeout(function() {
                    startTypewriter(nextLeaf, message, nextIsClosingLeaf);
                }, halfFlip);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        if (!IS_END_MODE) {
            updateSkyMessage(PHASESTART);
        }
    </script>
</body>
